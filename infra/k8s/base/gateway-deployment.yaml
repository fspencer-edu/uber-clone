apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: your-dockerhub-or-ecr/gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: USER_SERVICE_URL
              value: http://user-service:8080