apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: your-dockerhub-or-ecr/user-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: postgres://appuser:apppassword@postgres:5432/appdb?sslmode=disable